[build]
builder = "nixpacks"
buildCommand = "mvn clean package -pl auth-service --also-make -DskipTests"

[deploy]
startCommand = "java -jar -Dspring.profiles.active=production auth-service/target/auth-service-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
