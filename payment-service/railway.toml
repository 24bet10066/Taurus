[build]
builder = "nixpacks"
buildCommand = "mvn clean package -pl payment-service --also-make -DskipTests"

[deploy]
startCommand = "java -jar -Dspring.profiles.active=production payment-service/target/payment-service-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
