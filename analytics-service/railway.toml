[build]
builder = "nixpacks"
buildCommand = "mvn clean package -pl analytics-service --also-make -DskipTests"

[deploy]
startCommand = "java -jar -Dspring.profiles.active=production analytics-service/target/analytics-service-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
