server:
  port: 8088

spring:
  application:
    name: analytics-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${ANALYTICS_DB_URL:jdbc:postgresql://localhost:5432/serviceos_analytics?sslmode=require}
    username: ${ANALYTICS_DB_USER:postgres}
    password: ${ANALYTICS_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 3s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${KAFKA_SASL_JAAS:}
    consumer:
      group-id: analytics-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.serviceos.shared.event

serviceos:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-a-long-random-secret-of-at-least-32-bytes}

services:
  job:
    url: ${JOB_SERVICE_URL:http://localhost:8082}
  parts:
    url: ${PARTS_SERVICE_URL:http://localhost:8083}
  technician:
    url: ${TECHNICIAN_SERVICE_URL:http://localhost:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.serviceos.analytics: DEBUG
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
