[build]
builder = "nixpacks"
buildCommand = "mvn clean package -pl api-gateway --also-make -DskipTests"

[deploy]
startCommand = "java -jar -Dspring.profiles.active=production api-gateway/target/api-gateway-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
