server:
  port: 8082

spring:
  application:
    name: job-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${JOB_DB_URL:jdbc:postgresql://localhost:5432/serviceos_jobs?sslmode=require}
    username: ${JOB_DB_USER:postgres}
    password: ${JOB_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Kolkata
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 3s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:}
      sasl.jaas.config: ${KAFKA_SASL_JAAS:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: job-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.serviceos.shared.event

services:
  technician:
    url: ${TECHNICIAN_SERVICE_URL:http://localhost:8085}
  auth:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

serviceos:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-a-long-random-secret-of-at-least-32-bytes}
  assignment:
    weight-skill: 0.50
    weight-workload: 0.30
    weight-trust: 0.20

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.serviceos.job: DEBUG
    org.apache.kafka: WARN
    org.springframework.kafka: INFO
