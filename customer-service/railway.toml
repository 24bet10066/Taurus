[build]
builder = "nixpacks"
buildCommand = "mvn clean package -pl customer-service --also-make -DskipTests"

[deploy]
startCommand = "java -jar -Dspring.profiles.active=production customer-service/target/customer-service-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
